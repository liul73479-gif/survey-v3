function ld(){
  var tbody=document.getElementById('tb');
  tbody.innerHTML='<tr><td colspan="7" class="empty2">加载中...</td></tr>';
  fetch('https://webhook.site/token/533daaad-aab3-4b80-84b5-aa15f759e17e/requests?sorting=newest&per_page=100',{headers:{'Accept':'application/json'}})
  .then(function(r){return r.json()})
  .then(function(resp){
    var rows=resp.data||[];
    document.getElementById('tc').textContent=rows.length;
    var today=new Date().toISOString().slice(0,10);
    var todayCount=rows.filter(function(r){return r.created_at.slice(0,10)===today}).length;
    document.getElementById('tdc').textContent=todayCount;
    if(rows.length>0)document.getElementById('lt').textContent=rows[0].created_at.replace('T',' ').slice(0,19);
    if(rows.length===0){tbody.innerHTML='<tr><td colspan="7" class="empty2">暂无提交数据</td></tr>';return}

      var d={};
      try{d=JSON.parse(r.content)}catch(e){}
      return '<tr><td>'+(i+1)+'</td><td>'+(d.name||'--')+'</td><td>'+(d.role||'--')+'</td><td>'+(d.brand||'--')+' '+(d.model||'')+'</td><td>'+(d.valueRating?rss(d.valueRating):'--')+'</td><td style="font-size:12px;color:var(--t2)">'+r.created_at.replace('T',' ').slice(0,19)+'</td><td><button class="btn-sm btn-out" onclick="vd(\''+r.uuid+'\')">详情</button></td></tr>'
    }).join('');

  }).catch(function(){tbody.innerHTML='<tr><td colspan="7" class="empty2">加载失败，刷新重试</td></tr>'});
}
